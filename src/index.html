<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>atril</title>
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="main.js"></script>
</head>
<body>
  <div id="app">
    <button id="theme-toggle" type="button" aria-label="Toggle theme"></button>
    <div id="entry-screen" class="screen">
      <h1>atril</h1>
      <p class="subtitle">A reading stand for your repository</p>
      <form id="repo-form">
        <input
          id="repo-input"
          type="text"
          placeholder="owner/repo or GitHub URL"
          autocomplete="off"
          autofocus
        />
        <button type="submit">Open</button>
      </form>
      <p id="repo-error" class="error" role="alert"></p>
    </div>
    <div id="overview-screen" class="screen" hidden>
      <header id="overview-header"></header>
      <div id="overview-sources"></div>
      <div id="overview-actions"></div>
      <div id="overview-suggestions"></div>
      <div id="overview-empty" hidden>
        <p>No structured knowledge sources detected in this repository.</p>
      </div>
    </div>
    <div id="file-screen" class="screen" hidden>
      <nav id="file-nav">
        <button id="file-back">← Back</button>
        <span id="file-breadcrumb"></span>
        <button id="file-history">History</button>
      </nav>
      <article id="file-content"></article>
    </div>
    <div id="beads-screen" class="screen" hidden>
      <nav id="beads-nav">
        <button id="beads-back">← Back</button>
        <span id="beads-breadcrumb">Issues</span>
      </nav>
      <section id="beads-content"></section>
    </div>
    <div id="history-screen" class="screen" hidden>
      <nav id="history-nav">
        <button id="history-back">← Back</button>
        <span id="history-breadcrumb">History</span>
      </nav>
      <section id="history-content"></section>
    </div>
    <div id="wai-screen" class="screen" hidden>
      <nav id="wai-nav">
        <button id="wai-back">← Back</button>
        <span id="wai-breadcrumb">WAI</span>
      </nav>
      <section id="wai-content"></section>
    </div>
    <div id="tree-screen" class="screen" hidden>
      <nav id="tree-nav">
        <button id="tree-back">← Back</button>
        <span id="tree-breadcrumb">Files</span>
      </nav>
      <div id="tree-search-container">
        <input
          id="tree-search"
          type="text"
          placeholder="Search files…"
          autocomplete="off"
        />
      </div>
      <section id="tree-content"></section>
    </div>
    <div id="loading-screen" class="screen" hidden role="status" aria-live="polite" aria-atomic="true">
      <p id="loading-message" class="loading">Loading repository…</p>
    </div>
    <div id="error-screen" class="screen" hidden>
      <p id="error-message" class="error"></p>
      <button id="error-back">Back</button>
    </div>
  </div>
</body>
</html>
